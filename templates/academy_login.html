<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Academy Login | SmartGov</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
padding:20px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#003366,#0055a5,#0d6efd);
font-family:'Segoe UI',sans-serif;
}

/* LOGIN CARD */

.login-card{

background:white;
padding:40px;
border-radius:12px;
width:100%;
max-width:420px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
animation:fadeIn 0.6s;

}
@media (max-width: 576px) {
    .login-card {
        padding: 30px 20px;
    }
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
font-size:40px;
color:#0d6efd;
margin-bottom:10px;
}

.title{
font-weight:bold;
color:#003366;
}

.subtitle{
font-size:14px;
color:#777;
margin-bottom:20px;
}

.input-group-text{
background:#0d6efd;
color:white;
border:none;
}

.btn-login{
width:100%;
padding:10px;
font-size:16px;
font-weight:600;
border-radius:8px;
}

.footer-text{
font-size:13px;
margin-top:15px;
color:#777;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-card">

<div class="text-center">

<i class="fa fa-graduation-cap logo"></i>

<h3 class="title">Academy Portal</h3>

<p class="subtitle">Login to manage your coaching courses</p>

</div>


{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="alert alert-danger text-center">

{{messages[0]}}

</div>

{% endif %}
{% endwith %}


<form method="POST">

<!-- EMAIL -->

<div class="mb-3">

<label>Email Address</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-envelope"></i>
</span>

<input type="email"
name="email"
class="form-control"
placeholder="Enter Academy Email"
required>

</div>

</div>


<!-- PASSWORD -->

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password"
id="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

<button type="button"
class="btn btn-outline-secondary"
onclick="togglePassword()">

<i class="fa fa-eye"></i>

</button>

</div>

</div>


<button class="btn btn-primary btn-login">

<i class="fa fa-sign-in-alt"></i> Login

</button>

</form>


<div class="text-center mt-3">

Don't have an academy account?

<a href="/academy/register">

Register Here

</a>

</div>
<div class="text-center mt-3">

<a href="/" class="btn btn-outline-secondary btn-sm">

<i class="fa fa-home"></i> Back to Home

</a>

</div>

<div class="text-center footer-text">

SmartGov AI Career Recommendation System

</div>

</div>


<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

</script>

</body>
</html>

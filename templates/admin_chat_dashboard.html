<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Chat Dashboard | SmartGov</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:'Segoe UI',sans-serif;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:#002855;
color:white;
position:fixed;
width:250px;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#0d6efd;
}

/* MAIN */

.main{
margin-left:250px;
padding:25px;
}

/* STUDENT CARD */

.student-card{

background:white;
border-radius:10px;
padding:15px;
margin-bottom:12px;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
transition:0.3s;

}

.student-card:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

.student-info{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#0d6efd;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.badge-new{
background:red;
}


@media (max-width: 768px) {
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        padding-bottom: 15px;
    }
    .sidebar a {
        display: inline-block;
        padding: 8px 15px;
        font-size: 14px;
    }
    .sidebar h4 {
        margin-bottom: 15px;
        text-align: left;
        padding-left: 15px;
    }
    .main {
        margin-left: 0;
        padding: 15px;
    }
}

</style>

</head>


<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h4><i class="fa fa-shield-halved"></i> SmartGov</h4>

<a href="/admin/dashboard">
<i class="fa fa-chart-line"></i> Dashboard
</a>

<a href="/admin/upload_job">
<i class="fa fa-upload"></i> Upload Job
</a>

<a href="/admin/jobs">
<i class="fa fa-briefcase"></i> Manage Jobs
</a>

<a href="/admin/chat">
<i class="fa fa-comments"></i> Student Enquiries
</a>

<a href="/admin/logout">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<h3 class="mb-4">Student Support Enquiries</h3>


<div class="card p-4">

<h5 class="mb-3">Students List</h5>

{% for item in students %}

<a href="/admin/chat/{{item.student.id}}" style="text-decoration:none;color:black;">

<div class="student-card">

<div class="student-info">

<div class="avatar">

{{item.student.full_name[0]}}

</div>

<div>

<strong>{{item.student.full_name}}</strong><br>

<small class="text-muted">{{item.student.email}}</small>

</div>

</div>

{% if item.unread > 0 %}

<span class="badge badge-new">
{{item.unread}} new
</span>

{% endif %}

</div>

</a>

{% endfor %}

</div>

</div>

</body>
</html>

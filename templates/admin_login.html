<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | SmartGov</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
padding:20px;
background:linear-gradient(120deg,#003366,#0055a5,#0d6efd);
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
}

/* LOGIN CARD */

.login-card{

background:white;
border-radius:15px;
padding:40px;
width:100%;
max-width:420px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
animation:fadeIn 0.6s ease;

}
@media (max-width: 576px) {
    .login-card {
        padding: 30px 20px;
    }
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.login-title{
font-weight:bold;
margin-bottom:10px;
color:#003366;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:25px;
}

/* INPUT GROUP */

.input-group-text{
background:#0d6efd;
color:white;
border:none;
}

.form-control{
height:45px;
}

.btn-login{
width:100%;
padding:10px;
font-weight:600;
font-size:16px;
border-radius:8px;
}

.footer-text{
margin-top:15px;
font-size:13px;
color:#777;
}

.logo{
font-size:32px;
color:#0d6efd;
margin-bottom:10px;
}

</style>

</head>

<body>


<div class="login-card">

<div class="text-center">

<i class="fa fa-shield-halved logo"></i>

<h3 class="login-title">SmartGov Admin Portal</h3>

<p class="subtitle">Secure Government Job Management System</p>

</div>


{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="alert alert-danger text-center">

{{messages[0]}}

</div>

{% endif %}
{% endwith %}


<form method="POST">

<div class="mb-3">

<label class="form-label">Username</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-user"></i>
</span>

<input type="text" name="username" class="form-control" placeholder="Enter admin username" required>

</div>

</div>



<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa fa-lock"></i>
</span>

<input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>

<button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
<i class="fa fa-eye"></i>
</button>

</div>

</div>


<button class="btn btn-primary btn-login">

<i class="fa fa-sign-in-alt"></i> Login

</button>


</form>
<div class="text-center mt-3">

<a href="/" class="btn btn-outline-secondary btn-sm">

<i class="fa fa-home"></i> Back to Home

</a>

</div>
<div class="text-center footer-text">

SmartGov Career Recommendation System  
<br>
Government Job Intelligence Platform

</div>

</div>


<script>

function togglePassword(){

var x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}

}

</script>

</body>

</html>

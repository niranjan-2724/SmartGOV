<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Upload Advertisement | SmartGov</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:'Segoe UI',sans-serif;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:#002855;
color:white;
position:fixed;
width:250px;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#0d6efd;
}

/* MAIN AREA */

.main{
margin-left:250px;
padding:25px;
}

/* CARD */

.card-box{
border:none;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.upload-area{
border:2px dashed #0d6efd;
padding:30px;
text-align:center;
border-radius:10px;
background:#f8fbff;
cursor:pointer;
}

.upload-area:hover{
background:#eef5ff;
}


@media (max-width: 768px) {
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        padding-bottom: 15px;
    }
    .sidebar a {
        display: inline-block;
        padding: 8px 15px;
        font-size: 14px;
    }
    .sidebar h4 {
        margin-bottom: 15px;
        text-align: left;
        padding-left: 15px;
    }
    .main {
        margin-left: 0;
        padding: 15px;
    }
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h4><i class="fa fa-school"></i> SmartGov</h4>

<a href="/academy/dashboard">
<i class="fa fa-chart-line"></i> Dashboard
</a>

<a href="/academy/upload_course">
<i class="fa fa-book"></i> Upload Course
</a>

<a href="/academy/upload_ad">
<i class="fa fa-image"></i> Upload Advertisement
</a>

<a href="/academy/logout">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>

<!-- MAIN -->

<div class="main">

<h3 class="mb-4">Upload Advertisement</h3>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="alert alert-success">
{{messages[0]}}
</div>

{% endif %}
{% endwith %}

<div class="card card-box p-4">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">Advertisement Title</label>

<input type="text"
name="title"
class="form-control"
placeholder="Example: SSC 2026 Crash Course"
required>

</div>

<div class="mb-3">

<label class="form-label">Upload Poster / Brochure</label>

<div class="upload-area">

<i class="fa fa-cloud-upload fa-2x text-primary"></i>

<p class="mt-2">Upload Image or PDF Advertisement</p>

<input type="file"
name="file"
class="form-control"
accept=".jpg,.jpeg,.png,.pdf"
required>

</div>

</div>

<button class="btn btn-primary">

<i class="fa fa-upload"></i> Upload Advertisement

</button>

</form>

</div>

</div>

</body>
</html>

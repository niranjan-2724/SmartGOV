<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Job | SmartGov Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:'Segoe UI',sans-serif;
}

/* SIDEBAR */

.sidebar{
height:100vh;
background:#002855;
color:white;
position:fixed;
width:250px;
padding-top:20px;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
font-weight:bold;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#0d6efd;
}

/* MAIN AREA */

.main{
margin-left:250px;
padding:30px;
}

/* CARD */

.form-card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* BUTTON */

.btn-upload{
padding:10px 20px;
font-weight:600;
}


@media (max-width: 768px) {
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        padding-bottom: 15px;
    }
    .sidebar a {
        display: inline-block;
        padding: 8px 15px;
        font-size: 14px;
    }
    .sidebar h4 {
        margin-bottom: 15px;
        text-align: left;
        padding-left: 15px;
    }
    .main {
        margin-left: 0;
        padding: 15px;
    }
}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h4><i class="fa fa-shield-halved"></i> SmartGov</h4>

<a href="/admin/dashboard">
<i class="fa fa-chart-line"></i> Dashboard
</a>

<a href="/admin/upload_job">
<i class="fa fa-upload"></i> Upload Job
</a>

<a href="/admin/jobs">
<i class="fa fa-briefcase"></i> View Jobs
</a>

<a href="/admin/chat">
<i class="fa fa-comments"></i> Student Enquiry
</a>

<a href="/logout">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>



<!-- MAIN CONTENT -->

<div class="main">

<h2 class="mb-4">Upload Government Job</h2>


{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="alert alert-success">

{{messages[0]}}

</div>

{% endif %}
{% endwith %}



<div class="form-card">

<form method="POST" enctype="multipart/form-data">

<div class="row">


<div class="col-md-6 mb-3">

<label class="form-label">Job Title</label>

<input type="text" name="job_title" class="form-control" required>

</div>


<div class="col-md-6 mb-3">

<label class="form-label">Department</label>

<input type="text" name="department" class="form-control" required>

</div>


<div class="col-md-6 mb-3">

<label class="form-label">Qualification</label>

<select name="qualification" class="form-control" required>

<option value="">Select Qualification</option>
<option>10th Pass</option>
<option>12th Pass</option>
<option>Diploma</option>
<option>Any Degree</option>
<option>B.E / B.Tech</option>
<option>Post Graduate</option>

</select>

</div>


<div class="col-md-6 mb-3">

<label class="form-label">Age Limit</label>

<input type="text" name="age_limit" class="form-control" placeholder="Example: 18-30 Years">

</div>


<div class="col-md-6 mb-3">

<label class="form-label">Job Location</label>

<input type="text" name="location" class="form-control">

</div>


<div class="col-md-6 mb-3">

<label class="form-label">Last Date to Apply</label>

<input type="date" name="last_date" class="form-control">

</div>


<div class="col-md-12 mb-3">

<label class="form-label">Job Description</label>

<textarea name="description" rows="4" class="form-control"></textarea>

</div>


<div class="col-md-12 mb-3">

<label class="form-label">Upload Job Notification PDF</label>

<input type="file" name="pdf_file" class="form-control" accept=".pdf" required>

</div>


</div>


<button class="btn btn-primary btn-upload">

<i class="fa fa-upload"></i> Upload Job

</button>


</form>

</div>

</div>

</body>

</html>
